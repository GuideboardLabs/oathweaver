name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests-passed-and-coverage-met:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.lock
      - name: Syntax check
        run: python -m compileall SourceCode tests smoke_test.py run_integration_tests.py tools
      - name: Smoke test
        run: python smoke_test.py
      - name: Unit and integration tests with coverage gate
        run: |
          pytest -q tests \
            --cov=SourceCode \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=70 | tee coverage.txt
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            coverage.txt
          if-no-files-found: error
      - name: UI smoke test
        run: python tools/ui_phase_smoke.py
      - name: Browser headless smoke
        run: python tools/browser_headless_smoke.py
        continue-on-error: true
      - name: Repo health check
        run: python tools/repo_health_check.py
